<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prompt Wars Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app" role="main" aria-label="Prompt Wars Assistant">
    <section class="chat-container" aria-live="polite" aria-atomic="false">
      <div id="chat" class="chat-messages"></div>
    </section>
    <section class="input-section">
      <form id="chatForm" autocomplete="off">
        <input type="text" id="userInput" placeholder="Ask me anything..." aria-label="User input" required />
        <button type="submit" aria-label="Send message">Send</button>
      </form>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
